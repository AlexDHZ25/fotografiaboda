<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography & Film | Minimalist Editorial</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
</head>
<body class="dark-mode">

    <nav class="navbar">
        <div class="logo">STUDIO</div>
        <div class="nav-links">
            <a href="#" data-key="nav_home">Inicio</a>
            <a href="#gallery" data-key="nav_gallery">Galería</a>
            <a href="#contact" data-key="nav_contact">Contacto</a>
            <button id="lang-switch">EN</button>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1 data-key="hero_title">Historias Atemporales</h1>
            <p data-key="hero_subtitle">Fotografía & Cine de Boda</p>
        </div>
        <div class="hero-image">
            <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&q=80&w=2000" alt="Boda Editorial">
        </div>
    </header>

    <section id="philosophy" class="about">
        <h2 data-key="about_title">La Filosofía</h2>
        <p data-key="about_text">Capturando la honestidad de los momentos, la luz natural y la elegancia de lo espontáneo.</p>
    </section>

    <section id="gallery" class="gallery-grid">
        <div class="photo tall"><img src="https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&q=80&w=800"></div>
        <div class="photo"><img src="https://images.unsplash.com/photo-1532712938310-34cb3982ef74?auto=format&fit=crop&q=80&w=800"></div>
        <div class="photo"><img src="https://images.unsplash.com/photo-1515934751635-c81c6bc9a2d8?auto=format&fit=crop&q=80&w=800"></div>
        <div class="photo tall"><img src="https://images.unsplash.com/photo-1469334031218-e382a71b716b?auto=format&fit=crop&q=80&w=800"></div>
    </section>

    <footer>
        <p data-key="footer">© 2026 Studio. Todos los derechos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
